<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agua SAC | Sistema de Gestión</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <div class="overlay" id="overlay"></div>

    <div class="wrapper">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>💧 Agua SAC</h3>
            </div>
            <ul class="list-unstyled">
                <li>
                    <a href="javascript:void(0)" onclick="mostrarSeccion('tabla')" class="menu-link activo">
                        <i class="fas fa-users"></i> Lista de Clientes
                    </a>
                </li>
                <li>
                    <a href="javascript:void(0)" onclick="mostrarSeccion('formulario')" class="menu-link">
                        <i class="fas fa-user-plus"></i> Añadir Cliente
                    </a>
                </li>
                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">
                <li>
                    <a href="#" id="btn-logout">
                        <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                    </a>
                </li>
            </ul>
        </nav>

        <div id="content">
            <header class="main-header">
                <button class="hamburger" id="btn-menu">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="header-info">
                    <h1>Gestion_Agua_Sac</h1>
                    <p id="breadcrumb">Panel > Lista de Clientes</p>
                </div>
            </header>

            <main class="container">
                <section id="vista-tabla" class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-list"></i> Clientes de Pucallpa</h2>
                        <button class="btn-refresh" onclick="obtenerClientes()">
                            <i class="fas fa-sync-alt"></i> Actualizar
                        </button>
                    </div>
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>DNI</th>
                                    <th>Dirección</th>
                                    <th>Medidor</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="lista-clientes">
                                </tbody>
                        </table>
                    </div>
                </section>
                <section id="vista-formulario" class="card shadow-sm border-0" style="display: none; border-radius: 15px;">
                    <div class="card-header bg-primary text-white" style="border-radius: 15px 15px 0 0;">
                        <h2 class="h5 mb-0"><i class="fas fa-user-plus me-2"></i>Nuevo Registro de Cliente</h2>
                    </div>
                    <div class="card-body p-4">
                        <form id="form-cliente">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-secondary">Nombre Completo</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="fas fa-user text-primary"></i></span>
                                        <input type="text" class="form-control" id="nombreCompleto" placeholder="Ej. Aniebell Garcia" required>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-secondary">DNI</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="fas fa-id-card text-primary"></i></span>
                                        <input type="text" class="form-control" id="dni" maxlength="8" placeholder="Número de 8 dígitos" required>
                                    </div>
                                </div>

                                <div class="col-md-12">
                                    <label class="form-label fw-bold text-secondary">Dirección Exacta</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="fas fa-map-marker-alt text-primary"></i></span>
                                        <input type="text" class="form-control" id="direccion" placeholder="Calle, número y referencia en Pucallpa" required>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-secondary">Estado del Medidor</label>
                                    <select class="form-select" id="estadoMedidor">
                                        <option value="Bueno">✅ Bueno</option>
                                        <option value="Malogrado">❌ Malogrado</option>
                                        <option value="Sin Medidor">⚠️ Sin Medidor</option>
                                    </select>
                                </div>

                                <div class="col-md-12 d-flex justify-content-end gap-2 mt-4">
                                    <button type="button" class="btn btn-outline-secondary px-4" onclick="mostrarSeccion('tabla')" style="border-radius: 10px;">
                                        Cancelar
                                    </button>
                                    <button type="submit" class="btn btn-primary px-5 shadow-sm" style="border-radius: 10px; background-color: #6f42c1; border: none;">
                                        <i class="fas fa-save me-2"></i> Registrar Cliente
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="js/siderbar.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
